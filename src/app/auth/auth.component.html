<div class="auth-container">
  <div class="auth-inner-left">
    <div class="margin-sm">
      <h6 class="header light margin-sm-bottom text-center">Menues Only</h6>
      <small>We always know the M.O...</small>
    </div>
  </div>
  <div class="auth-inner-right" [ngSwitch]="page">
    <h4 class="header font-white margin-sm-bottom text-center">Welcome To M.O</h4>
    <small class="light font-white margin-sm-bottom">We are always happy to have you back.</small>
    <div class="form-holder">
      <div class="ui two item menu">
        <a [ngClass]="{'item': true, 'active': isPage('signIn')}" (click)="setPage('signIn')">Sign In</a>
        <a [ngClass]="{'item': true, 'active': isPage('register')}" (click)="setPage('register')">Register</a>
      </div>
      <ng-template ngSwitchCase="signIn">
        <div class="ui one column grid container">
          <div class="row">
            <div class="column">
              <form class="ui form">
                <div class="field">
                  <label>Email</label>
                  <input type="email" name="email" placeholder="merchant@example.com"/>
                </div>
                <div class="field">
                  <label>Password</label>
                  <input type="password" name="password"/>
                </div>
                <small>Remember, never share your password with anyone.</small>
                <br/>
                <button class="ui button">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </ng-template>
      <ng-template ngSwitchCase="register">
        <div class="ui one column grid container">
          <div class="row">
            <div class="column">
              <form class="ui form" name="" autocomplete="off" aria-autocomplete="none">
                <div class="field">
                  <label for="name">Company Name</label>
                  <input id="name" type="text" [(ngModel)]="data.name" name="name" placeholder="e.g. New Kid on the Block"/>
                </div>
                <div class="field">
                  <label for="emailR">Email</label>
                  <input id="emailR" type="email" [(ngModel)]="data.email" name="emailR" required placeholder="e.g. merchant@example.com"/>
                </div>
                <div class="field">
                  <label for="passwordR">Password</label>
                  <input id="passwordR" type="password" [(ngModel)]="data.password" name="passwordR" required/>
                </div>
                <div class="field">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" type="password" [(ngModel)]="data.confirmPassword" name="confirmPassword" required/>
                  </div>
                <small>Remember, never share your password with anyone.</small>
                <br/>
                <button class="ui button">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>
